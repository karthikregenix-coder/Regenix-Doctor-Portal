<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regenix Doctor Registration Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:40px 20px;
background:linear-gradient(135deg,#ecfdff,#dffcff,#f7ffff);
overflow-x:hidden;
position:relative;
}

/* Floating Background */

body::before{
content:'';
position:fixed;
width:420px;
height:420px;
background:#11BCC4;
opacity:.08;
border-radius:50%;
top:-150px;
left:-120px;
filter:blur(30px);
}

body::after{
content:'';
position:fixed;
width:350px;
height:350px;
background:#11BCC4;
opacity:.08;
border-radius:50%;
bottom:-120px;
right:-100px;
filter:blur(40px);
}

/* Decorative Medical Plus */

.plus1,
.plus2,
.plus3{
position:fixed;
color:#11BCC4;
font-size:42px;
opacity:.08;
font-weight:700;
pointer-events:none;
}

.plus1{
top:18%;
left:8%;
}

.plus2{
top:65%;
right:8%;
}

.plus3{
bottom:10%;
left:18%;
}

.container{

width:100%;
max-width:620px;
background:rgba(255,255,255,.95);
backdrop-filter:blur(15px);
border-radius:28px;
padding:45px;
box-shadow:
0 25px 60px rgba(0,0,0,.12);
border:1px solid rgba(17,188,196,.18);
position:relative;
overflow:hidden;

}

/* Top Gradient */

.container::before{

content:'';
position:absolute;
left:0;
top:0;
width:100%;
height:8px;
background:linear-gradient(90deg,#11BCC4,#30D7DE);

}

.logo{

text-align:center;
margin-bottom:18px;

}

.logo img{

width:200px;
transition:.3s;

}

.logo img:hover{

transform:scale(1.05);

}

h1{

text-align:center;
font-size:33px;
font-weight:700;
color:#11BCC4;

}

.subtitle{

text-align:center;
margin-top:8px;
margin-bottom:28px;
color:#64748B;
font-size:15px;

}

.form-group{

margin-bottom:20px;

}

label{

display:block;
font-weight:600;
margin-bottom:8px;
color:#1E293B;

}

input,
textarea{

width:100%;
padding:16px 18px;
border-radius:14px;
border:2px solid #d8ecee;
font-size:15px;
transition:.30s;
background:#fff;

}

input:focus,
textarea:focus{

outline:none;
border-color:#11BCC4;
box-shadow:0 0 0 5px rgba(17,188,196,.15);

}

textarea{

resize:none;
height:90px;

}

button{

width:100%;
padding:17px;
border:none;
border-radius:16px;
background:linear-gradient(90deg,#11BCC4,#29D3DA);
color:#fff;
font-size:18px;
font-weight:600;
cursor:pointer;
transition:.35s;
box-shadow:0 15px 25px rgba(17,188,196,.35);

}

button:hover{

transform:translateY(-4px);
box-shadow:0 20px 35px rgba(17,188,196,.45);

}

.banner{

text-align:center;
margin-top:40px;

}

.banner img{

width:100%;
max-width:300px;
transition:.4s;

}

.banner img:hover{

transform:scale(1.03);

}

.tagline{

text-align:center;
margin-top:10px;
font-size:16px;
font-weight:600;
color:#11BCC4;

}

.footer{

text-align:center;
margin-top:30px;
font-size:13px;
color:#64748B;

}

@media(max-width:600px){

.container{

padding:28px;

}

.logo img{

width:160px;

}

h1{

font-size:27px;

}

}
</style>
<div class="plus1">+</div>
<div class="plus2">+</div>
<div class="plus3">+</div>

</head>

<body>

<div class="container">

<div class="logo">
<img src="regenix-logo.png" alt="Regenix Logo">
</div>

<h1>Doctor Registration Portal</h1>

<p class="subtitle">
Please provide your professional details.
</p>

<div class="banner">

<img src="sustaglar.png" alt="SUSTAGLAR">

<div class="tagline">
Together in Diabetes Care
</div>

</div>

<form id="registrationForm">

<div class="form-group">
<label>Doctor Name *</label>
<input type="text" placeholder="Enter Doctor Name" required>
</div>

<div class="form-group">
<label>Phone Number *</label>
<input type="tel" placeholder="Enter Phone Number" required>
</div>

<div class="form-group">
<label>Email ID</label>
<input type="email" placeholder="Enter Email Address">
</div>

<div class="form-group">
<label>Hospital / Clinic Name *</label>
<textarea placeholder="Enter Hospital / Clinic Name" required></textarea>
</div>

<div class="form-group">
<label>Area / City *</label>
<input type="text" placeholder="Enter Area / City" required>
</div>

<button type="submit">Submit</button>

</form>

<div class="footer">

© Regenix Drugs Limited

</div>

</div>

<script>

document.getElementById("registrationForm").addEventListener("submit",function(e){

e.preventDefault();

alert("Thank you! Your registration has been submitted successfully.");

});

</script>

</body>
</html>
