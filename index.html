<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regenix Doctor Registration Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#f4fcfd;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;

}

.container{

width:100%;
max-width:600px;
background:#fff;
border-radius:22px;
padding:40px;
box-shadow:0 15px 40px rgba(0,0,0,.12);

}

.logo{

text-align:center;
margin-bottom:20px;

}

.logo img{

width:190px;

}

h1{

text-align:center;
color:#11BCC4;
font-size:34px;
margin-bottom:8px;

}

.subtitle{

text-align:center;
color:#666;
font-size:15px;
margin-bottom:25px;

}

.banner{

text-align:center;
margin-bottom:30px;

}

.banner img{

width:100%;
max-width:340px;

}

.form-group{

margin-bottom:18px;

}

label{

display:block;
margin-bottom:8px;
font-weight:600;
color:#333;

}

input,
textarea{

width:100%;
padding:15px;
border:2px solid #d8e7ea;
border-radius:12px;
font-size:15px;
transition:.3s;
outline:none;

}

input:focus,
textarea:focus{

border-color:#11BCC4;

}

textarea{

resize:none;
height:90px;

}

button{

width:100%;
background:#11BCC4;
color:white;
padding:16px;
font-size:18px;
font-weight:600;
border:none;
border-radius:12px;
cursor:pointer;
transition:.3s;

}

button:hover{

background:#0faab2;

}

.footer{

margin-top:25px;
text-align:center;
font-size:13px;
color:#777;

}

@media(max-width:600px){

.container{

padding:25px;

}

h1{

font-size:28px;

}

.logo img{

width:150px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="logo">
<img src="regenix-logo.png" alt="Regenix Logo">
</div>

<h1>Doctor Registration Portal</h1>

<p class="subtitle">
Please provide your professional details.
</p>

<div class="banner">
<img src="sustaglar.png" alt="SUSTAGLAR">
</div>

<form id="registrationForm">

<div class="form-group">
<label>Doctor Name *</label>
<input type="text" placeholder="Enter Doctor Name" required>
</div>

<div class="form-group">
<label>Phone Number *</label>
<input type="tel" placeholder="Enter Phone Number" required>
</div>

<div class="form-group">
<label>Email ID</label>
<input type="email" placeholder="Enter Email Address">
</div>

<div class="form-group">
<label>Hospital / Clinic Name *</label>
<textarea placeholder="Enter Hospital / Clinic Name" required></textarea>
</div>

<div class="form-group">
<label>Area / City *</label>
<input type="text" placeholder="Enter Area / City" required>
</div>

<button type="submit">Submit</button>

</form>

<div class="footer">

© Regenix Drugs Limited

</div>

</div>

<script>

document.getElementById("registrationForm").addEventListener("submit",function(e){

e.preventDefault();

alert("Thank you! Your registration has been submitted successfully.");

});

</script>

</body>
</html>
