<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Regenix Doctor Registration Portal</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:linear-gradient(135deg,#F6FEFE,#E8FCFD,#FFFFFF);

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:40px 20px;

overflow-x:hidden;

position:relative;

}

/* Background Graphics */

body::before{

content:"";

position:fixed;

width:420px;

height:420px;

background:#11BCC4;

border-radius:50%;

left:-140px;

top:-150px;

opacity:.08;

filter:blur(30px);

}

body::after{

content:"";

position:fixed;

width:380px;

height:380px;

background:#11BCC4;

border-radius:50%;

right:-140px;

bottom:-150px;

opacity:.08;

filter:blur(40px);

}

.plus{

position:fixed;

font-size:45px;

font-weight:bold;

color:#11BCC4;

opacity:.08;

user-select:none;

}

.p1{

left:7%;

top:20%;

}

.p2{

right:8%;

top:60%;

}

.p3{

left:20%;

bottom:8%;

}

.container{

width:100%;

max-width:650px;

background:white;

border-radius:28px;

padding:45px;

box-shadow:0 25px 60px rgba(0,0,0,.15);

position:relative;

overflow:hidden;

}

.container::before{

content:"";

position:absolute;

top:0;

left:0;

width:100%;

height:8px;

background:linear-gradient(90deg,#11BCC4,#33D8DF);

}

.logo{

text-align:center;

margin-bottom:20px;

}

.logo img{

width:200px;

}

h1{

text-align:center;

font-size:34px;

color:#11BCC4;

margin-bottom:10px;

}

.subtitle{

text-align:center;

color:#64748B;

margin-bottom:35px;

font-size:15px;

}

.form-group{

margin-bottom:20px;

}

label{

display:block;

margin-bottom:8px;

font-weight:600;

color:#334155;

}

.input-box{

position:relative;

}

.input-box i{

position:absolute;

left:18px;

top:18px;

color:#11BCC4;

}

.input-box input,

.input-box textarea{

width:100%;

padding:15px 18px 15px 50px;

border:2px solid #DCEFF1;

border-radius:14px;

font-size:15px;

transition:.3s;

outline:none;

}

.input-box textarea{

height:95px;

resize:none;

}

.input-box input:focus,

.input-box textarea:focus{

border-color:#11BCC4;

box-shadow:0 0 0 5px rgba(17,188,196,.15);

}

button{

width:100%;

padding:17px;

background:linear-gradient(90deg,#11BCC4,#30D7DE);

border:none;

border-radius:16px;

font-size:18px;

font-weight:600;

color:white;

cursor:pointer;

transition:.3s;

box-shadow:0 15px 30px rgba(17,188,196,.35);

}

button:hover{

transform:translateY(-3px);

box-shadow:0 20px 35px rgba(17,188,196,.45);

}

.banner{

margin-top:35px;

text-align:center;

}

.banner img{

width:240px;

max-width:90%;

}

.footer{

margin-top:20px;

text-align:center;

font-size:13px;

color:#64748B;

}

@media(max-width:700px){

.container{

padding:28px;

}

.logo img{

width:160px;

}

h1{

font-size:28px;

}

}

</style>

</head>
<body>

<div class="plus p1">+</div>
<div class="plus p2">+</div>
<div class="plus p3">+</div>

<div class="container">

    <!-- Regenix Logo -->
    <div class="logo">
        <img src="regenix-logo.png" alt="Regenix Logo">
    </div>

    <h1>Doctor Registration Portal</h1>

    <p class="subtitle">
        Please provide your professional details to complete your registration.
    </p>

    <form id="registrationForm">

        <div class="form-group">

            <label>Doctor Name *</label>

            <div class="input-box">

                <i class="fa-solid fa-user-doctor"></i>

                <input
                    type="text"
                    id="doctorName"
                    placeholder="Enter Doctor Name"
                    required>

            </div>

        </div>

        <div class="form-group">

            <label>Phone Number *</label>

            <div class="input-box">

                <i class="fa-solid fa-phone"></i>

                <input
                    type="tel"
                    id="phone"
                    placeholder="Enter 10-digit Mobile Number"
                    maxlength="10"
                    pattern="[0-9]{10}"
                    required>

            </div>

        </div>

        <div class="form-group">

            <label>Email ID</label>

            <div class="input-box">

                <i class="fa-solid fa-envelope"></i>

                <input
                    type="email"
                    id="email"
                    placeholder="Enter Email Address">

            </div>

        </div>

        <div class="form-group">

            <label>Hospital / Clinic Name *</label>

            <div class="input-box">

                <i class="fa-solid fa-hospital"></i>

                <textarea
                    id="hospital"
                    placeholder="Enter Hospital / Clinic Name"
                    required></textarea>

            </div>

        </div>

        <div class="form-group">

            <label>Area / City *</label>

            <div class="input-box">

                <i class="fa-solid fa-location-dot"></i>

                <input
                    type="text"
                    id="city"
                    placeholder="Enter Area / City"
                    required>

            </div>

        </div>

        <button type="submit">
            Submit
        </button>

    </form>

    <div class="banner">

        <img src="sustaglar.png" alt="SUSTAGLAR">

    </div>

    <div class="footer">

        © Regenix Drugs Limited
        <!-- Success Popup -->

<div id="successPopup" class="popup">

    <div class="popup-card">

        <i class="fa-solid fa-circle-check"></i>

        <h2>Registration Successful</h2>

        <p>
            Thank you for registering with Regenix.
        </p>

        <button onclick="closePopup()">
            OK
        </button>

    </div>

</div>

<style>

.popup{

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:rgba(0,0,0,.45);

display:flex;

justify-content:center;

align-items:center;

visibility:hidden;

opacity:0;

transition:.3s;

z-index:999;

}

.popup.show{

visibility:visible;

opacity:1;

}

.popup-card{

width:90%;

max-width:360px;

background:white;

padding:35px;

border-radius:24px;

text-align:center;

box-shadow:0 20px 50px rgba(0,0,0,.25);

animation:popup .35s ease;

}

@keyframes popup{

from{

transform:scale(.8);

opacity:0;

}

to{

transform:scale(1);

opacity:1;

}

}

.popup-card i{

font-size:70px;

color:#11BCC4;

margin-bottom:15px;

}

.popup-card h2{

color:#11BCC4;

margin-bottom:10px;

}

.popup-card p{

color:#555;

margin-bottom:25px;

}

.popup-card button{

padding:14px 35px;

border:none;

background:#11BCC4;

color:white;

border-radius:12px;

font-size:16px;

font-weight:600;

cursor:pointer;

}

</style>

<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxF6fg1HUlEHdn7aG6AtrJo-MgnGO_WDtI3dQ5e2QROcopLkqs4465CSWKwDhP8mVGvlw/exec";

const form = document.getElementById("registrationForm");
const popup = document.getElementById("successPopup");

form.addEventListener("submit", async function(e){

    e.preventDefault();

    const data = {

        doctorName: document.getElementById("doctorName").value,
        phone: document.getElementById("phone").value,
        email: document.getElementById("email").value,
        hospital: document.getElementById("hospital").value,
        city: document.getElementById("city").value

    };

    try{

        const response = await fetch(WEB_APP_URL,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(data)
        });

        const result = await response.json();

        if(result.result==="success"){

            popup.classList.add("show");

            form.reset();

        }

    }catch(error){

        console.error(error);

        alert("Unable to save registration.");

    }

});

function closePopup(){

    popup.classList.remove("show");

}

</script>
</body>

</html>

    </div>

</div>
