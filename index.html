<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Regenix Doctor Registration</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}body{background:linear-gradient(135deg,#F6FEFE,#E8FCFD,#FFF);display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}.card{max-width:650px;width:100%;background:#fff;border-radius:24px;padding:35px;box-shadow:0 20px 45px rgba(0,0,0,.15)}.logo{text-align:center}.logo img{width:180px}h1{text-align:center;color:#11BCC4;margin:15px 0 5px}p{text-align:center;color:#666;margin-bottom:25px}label{display:block;font-weight:600;margin:14px 0 6px}input,textarea{width:100%;padding:14px;border:2px solid #dceff1;border-radius:12px}textarea{height:90px;resize:none}button{margin-top:20px;width:100%;padding:16px;background:#11BCC4;color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:600;cursor:pointer}.banner{text-align:center;margin-top:30px}.banner img{width:230px;max-width:90%}</style></head><body><div class="card"><div class="logo"><img src="regenix-logo.png"></div><h1>Doctor Registration Portal</h1><p>Please provide your professional details.</p><form id="registrationForm"><label>Doctor Name</label><input id="doctorName" required><label>Phone Number</label><input id="phone" required><label>Email</label><input id="email" type="email"><label>Hospital / Clinic</label><textarea id="hospital" required></textarea><label>Area / City</label><input id="city" required><button type="submit">Submit</button></form><div class="banner"><img src="sustaglar.png"></div></div><script>const WEB_APP_URL="PASTE_YOUR_APPS_SCRIPT_URL_HERE";document.getElementById("registrationForm").addEventListener("submit",async(e)=>{e.preventDefault();const data={doctorName:doctorName.value,phone:phone.value,email:email.value,hospital:hospital.value,city:city.value};try{await fetch(WEB_APP_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(data)});alert("Registration Successful");e.target.reset();}catch(err){console.error(err);alert("Registration Failed. Press F12 and send me the Console error.");}});</script></body></html>
